<!DOCTYPE html> 
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️ Una pregunta ❤️</title>

<style>
body{
    margin:0;
    height:100vh;
    overflow:hidden;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(-45deg, #ffdde1, #ee9ca7, #c471ed, #12c2e9);
    background-size: 400% 400%;
    animation: gradient 12s ease infinite;
}

@keyframes gradient{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

/* 💖 CORAZONES GRANDES DESDE ABAJO */
.heart{
    position:absolute;
    bottom:-80px;
    font-size:70px;
    color:rgba(255,255,255,0.35);
    text-shadow:0 0 20px rgba(255,255,255,0.25);
    animation: float 10s linear infinite;
    opacity:0;
    pointer-events:none;
}

@keyframes float{
    0%{
        transform:translateY(0) scale(0.8);
        opacity:0;
    }
    15%{opacity:0.7;}
    100%{
        transform:translateY(-120vh) scale(1.2);
        opacity:0;
    }
}

/* LOGIN */
.login{
    background:rgba(255,255,255,0.15);
    backdrop-filter: blur(15px);
    border:1px solid rgba(255,255,255,0.3);
    padding:35px;
    border-radius:25px;
    text-align:center;
    width:300px;
}

.lock{
    font-size:65px;
}

input{
    padding:12px;
    width:80%;
    border-radius:12px;
    border:none;
    outline:none;
    text-align:center;
    margin-top:12px;
}

button{
    padding:12px 18px;
    margin-top:12px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-size:16px;
}

/* PISTA */
#hint{
    margin-top:10px;
    color:white;
    display:none;
}

/* PREGUNTA */
.caja{
    display:none;
    background:rgba(255,255,255,0.18);
    backdrop-filter: blur(15px);
    padding:40px;
    border-radius:25px;
    text-align:center;
    max-width:420px;
    position:relative;
}

.caja h1{
    color:white;
}

/* BOTONES */
.botones{
    margin-top:25px;
    display:flex;
    justify-content:center;
    gap:40px;
    position:relative;
    height:80px;
}

#si{
    background:#00e676;
    color:white;
    font-weight:bold;
}

#no{
    background:#ff5252;
    color:white;
    position:absolute;
    left:60%;
    top:20px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="loginBox">
    <div class="lock">🔒</div>

    <h2 style="color:white;">Ingresa el código</h2>

    <input id="code" placeholder="Código secreto">

    <br>

    <button onclick="check()">Entrar</button>
    <button onclick="showHint()">Pista</button>

    <p id="hint">💡 1601</p>
</div>

<!-- PREGUNTA -->
<div class="caja" id="caja">
    <h1>¿Te gustaría salir conmigo este fin de semana? ❤️</h1>

    <div class="botones">
        <button id="si">Sí ❤️</button>
        <button id="no">No 😈</button>
    </div>
</div>

<script>

/* 💖 CORAZONES GRANDES DESDE ABAJO */
function hearts(){
    const h = document.createElement("div");
    h.classList.add("heart");
    h.innerText = "♥";

    h.style.left = Math.random()*window.innerWidth + "px";
    h.style.fontSize = (60 + Math.random()*50) + "px";
    h.style.animationDuration = (6 + Math.random()*5) + "s";

    document.body.appendChild(h);

    setTimeout(()=>h.remove(),12000);
}
setInterval(hearts,180);

/* LOGIN */
function check(){
    let code = document.getElementById("code").value.trim();

    if(code === "1601"){
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("caja").style.display = "block";
    }
}

/* PISTA */
function showHint(){
    document.getElementById("hint").style.display = "block";
}

/* BOTÓN NO */
const noBtn = document.getElementById("no");

noBtn.addEventListener("mouseover",()=>{
    const box = document.querySelector(".botones").getBoundingClientRect();

    const maxX = box.width - 120;
    const maxY = box.height - 60;

    const x = Math.random()*maxX;
    const y = Math.random()*maxY;

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
});

/* ❤️ SI (CON MENSAJE + REDIRECCIÓN) */
document.getElementById("si").onclick = function(){

    fetch("https://api.telegram.org/bot8723434271:AAGNHbzGF1VuNI0p3NnmoNFLHwFeMu1e3lg/sendMessage", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            chat_id: "8362552253",
            text: `💌 Jessica acaba de decir que SÍ ❤️

✨ El momento que esperabas ya pasó
😳 Y la respuesta fue un SÍ

💕 Algo bonito empieza hoy… no lo arruines`
        })
    });

    setTimeout(() => {
        window.location.href = "pagina2.html";
    }, 1500);

};

</script>

</body>
</html>
