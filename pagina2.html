<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️</title>

<style>
body{
    margin:0;
    height:100vh;
    overflow:hidden;
    font-family:Arial, sans-serif;

    background: linear-gradient(-45deg, #ffdde1, #ee9ca7, #c471ed, #12c2e9);
    background-size: 400% 400%;
    animation: gradient 12s ease infinite;

    display:flex;
    justify-content:center;
    align-items:center;
}

/* 🌈 fondo */
@keyframes gradient{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

/* 🎬 INTRO */
.intro{
    position:fixed;
    inset:0;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:999;
    animation: fadeOut 2.8s ease forwards;
    animation-delay:2.8s;
}

/* ❤️ TEXTO TE QUIERO */
.logo{
    font-size:70px;
    font-weight:bold;
    color:#ff2d55;
    letter-spacing:6px;
    text-shadow:
        0 0 10px #ff2d55,
        0 0 25px #ff2d55,
        0 0 60px #ff2d55;

    animation: zoomIn 2.8s ease;
}

/* 🔍 efecto acercamiento tipo Netflix */
@keyframes zoomIn{
    0%{
        transform:scale(0.3);
        opacity:0;
        filter: blur(10px);
    }
    40%{
        opacity:1;
        filter: blur(0px);
    }
    100%{
        transform:scale(1.8);
        opacity:1;
        filter: blur(2px);
    }
}

/* desaparecer intro */
@keyframes fadeOut{
    to{
        opacity:0;
        visibility:hidden;
    }
}

/* 💖 CORAZONES */
.heart{
    position:absolute;
    bottom:-80px;
    font-size:50px;
    color:rgba(255,255,255,0.35);
    text-shadow:0 0 15px rgba(255,255,255,0.2);
    animation: float 10s linear infinite;
    pointer-events:none;
}

@keyframes float{
    0%{
        transform:translateY(0) scale(0.8);
        opacity:0;
    }
    15%{opacity:0.7;}
    100%{
        transform:translateY(-120vh) scale(1.2);
        opacity:0;
    }
}

/* 💖 CAJA */
.caja{
    background:rgba(255,255,255,0.18);
    backdrop-filter: blur(15px);
    padding:30px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 0 25px rgba(0,0,0,0.25);
    max-width:500px;
    color:white;
    position:relative;
}

/* 📱 SOLO AGREGADO: RESPONSIVE */
@media (max-width: 600px){

    .logo{
        font-size:40px;
        letter-spacing:3px;
    }

    .caja{
        width:90%;
        padding:20px;
    }

    .caja p{
        font-size:16px;
        line-height:1.6;
    }
}
</style>
</head>

<body>

<!-- 🎬 INTRO -->
<div class="intro">
    <div class="logo">TE QUIERO</div>
</div>

<!-- 💖 CORAZONES -->
<script>
function hearts(){
    const h = document.createElement("div");
    h.classList.add("heart");
    h.innerText = "♥";

    h.style.left = Math.random() * window.innerWidth + "px";
    h.style.fontSize = (30 + Math.random()*40) + "px";
    h.style.animationDuration = (6 + Math.random()*6) + "s";

    document.body.appendChild(h);

    setTimeout(()=>h.remove(),12000);
}
setInterval(hearts,500);
</script>

<!-- 💖 CONTENIDO -->
<div class="caja">
    <p>❤️ Gracias por aceptar.</p>

    <p> Paso por ti el sabado a las 2:00 PM.</p>

    <p> Si es necesario, hablaré con tus papás.</p>

    <p> Lo único que espero es que pasemos una tarde bonita juntos.</p>

    <p>💖 Estoy emocionado por verte.</p>
</div>

</body>
</html>
